<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MaToMa</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #0a0a0a;
  --bg2:    #111;
  --bg3:    #1a1a1a;
  --border: #2a2a2a;
  --accent: #4ade80;
  --dim:    #555;
  --text:   #ccc;
  --text2:  #888;
  --danger: #f87171;
  --warn:   #facc15;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'SF Mono', 'Fira Mono', 'Consolas', monospace;
  font-size: 12px;
}

/* ── Header ──────────────────────────────────────── */
#header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  height: 40px;
}
#header h1 {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.2em;
  color: var(--accent);
}
.status-row { display: flex; align-items: center; gap: 12px; }
.status-item { display: flex; align-items: center; gap: 5px; }
.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--dim);
  transition: background 0.3s;
  flex-shrink: 0;
}
.dot.ok   { background: var(--accent); }
.dot.warn { background: var(--warn); }
.dot.err  { background: var(--danger); }
.status-label { color: var(--text2); font-size: 11px; }

/* ── Control Bar ─────────────────────────────────── */
#controls {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  flex-wrap: wrap;
}
.sep { color: var(--border); }

.btn {
  padding: 5px 12px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  cursor: pointer;
  font-family: inherit;
  font-size: 11px;
  letter-spacing: 0.05em;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
  white-space: nowrap;
}
.btn:hover  { border-color: var(--dim); }
.btn:active { background: var(--bg); }
.btn.primary { border-color: var(--accent); color: var(--accent); }
.btn.primary:hover { background: #0d1f14; }
.btn.danger  { border-color: var(--danger); color: var(--danger); }
.btn.danger:hover  { background: #2a1010; }
.btn.stop-all {
  border-color: var(--danger);
  color: var(--danger);
  font-weight: 700;
  letter-spacing: 0.1em;
}
.btn.stop-all:hover { background: #2a1010; }

/* ── Now Playing ─────────────────────────────────── */
#now-playing {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  min-height: 52px;
}
#np-header {
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 0.12em;
  margin-bottom: 6px;
}
#np-body { display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; }
.np-field { display: flex; gap: 6px; align-items: baseline; }
.np-key   { font-size: 10px; color: var(--dim); }
.np-val   { font-size: 13px; color: var(--accent); font-weight: 700; }
.np-val.small { font-size: 11px; font-weight: normal; color: var(--text); }
#np-lines {
  margin-top: 6px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.tidal-line {
  font-size: 10px;
  color: var(--text2);
  background: var(--bg3);
  padding: 2px 8px;
  border-radius: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}

/* ── Track Catalog ───────────────────────────────── */
#catalog-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px;
}
#catalog-header {
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 0.12em;
  margin-bottom: 8px;
}
#catalog-table {
  width: 100%;
  border-collapse: collapse;
}
#catalog-table th {
  text-align: left;
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 0.1em;
  padding: 4px 8px;
  border-bottom: 1px solid var(--border);
  font-weight: normal;
}
#catalog-table td {
  padding: 5px 8px;
  border-bottom: 1px solid #161616;
  vertical-align: middle;
}
#catalog-table tr.track-row:hover td { background: var(--bg3); cursor: pointer; }
#catalog-table tr.track-row.playing td { background: #0d1f14; }
#catalog-table tr.track-row.playing td:first-child {
  border-left: 2px solid var(--accent);
  padding-left: 6px;
}
.col-id    { color: var(--text); font-size: 11px; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.col-bpm   { color: var(--accent); font-size: 11px; min-width: 52px; }
.col-key   { color: var(--text2); font-size: 11px; min-width: 80px; }
.col-dens  { min-width: 80px; }
.density-bar-wrap {
  width: 56px; height: 4px;
  background: var(--bg3);
  border-radius: 2px;
  display: inline-block;
  vertical-align: middle;
}
.density-bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
}
.col-play { width: 48px; text-align: right; }
.play-btn {
  padding: 3px 10px;
  background: none;
  border: 1px solid var(--dim);
  border-radius: 3px;
  color: var(--text2);
  cursor: pointer;
  font-family: inherit;
  font-size: 11px;
  transition: all 0.15s;
}
.play-btn:hover { border-color: var(--accent); color: var(--accent); background: #0d1f14; }
.track-row.playing .play-btn {
  border-color: var(--accent);
  color: var(--accent);
  background: #0d1f14;
}

/* ── Log Bar ─────────────────────────────────────── */
#log-bar {
  padding: 4px 16px;
  border-top: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text2);
  font-size: 10px;
  min-height: 22px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── Layout ──────────────────────────────────────── */
body {
  display: flex;
  flex-direction: column;
}
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
</style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────── -->
<div id="header">
  <div class="status-row">
    <div class="status-item">
      <div class="dot" id="dot-ws"></div>
      <span class="status-label" id="lbl-ws">WS --</span>
    </div>
    <span class="sep">|</span>
    <div class="status-item">
      <div class="dot" id="dot-sc"></div>
      <span class="status-label" id="lbl-sc">SC --</span>
    </div>
    <span class="sep">|</span>
    <div class="status-item">
      <div class="dot" id="dot-tidal"></div>
      <span class="status-label" id="lbl-tidal">Tidal --</span>
    </div>
  </div>
  <h1>MaToMa</h1>
  <div style="min-width:80px;text-align:right"><!-- spacer --></div>
</div>

<!-- ── Control Bar ────────────────────────────────── -->
<div id="controls">
  <button class="btn primary" id="btn-sc-start">SC 起動</button>
  <button class="btn danger"  id="btn-sc-stop">SC 停止</button>
  <span class="sep">|</span>
  <button class="btn primary" id="btn-tidal-start">Tidal 起動</button>
  <span class="sep">|</span>
  <button class="btn stop-all" id="btn-stop">■ STOP ALL</button>
</div>

<!-- ── Now Playing ───────────────────────────────── -->
<div id="now-playing">
  <div id="np-header">NOW PLAYING</div>
  <div id="np-body">
    <div class="np-field"><span class="np-key">track</span><span class="np-val" id="np-track">--</span></div>
    <div class="np-field"><span class="np-key">bpm</span><span class="np-val" id="np-bpm">--</span></div>
    <div class="np-field"><span class="np-key">key</span><span class="np-val small" id="np-key-val">--</span></div>
    <div class="np-field"><span class="np-key">synth</span><span class="np-val small" id="np-synth">--</span></div>
  </div>
  <div id="np-lines"></div>
</div>

<!-- ── Main ──────────────────────────────────────── -->
<div id="main">
  <div id="catalog-wrap">
    <div id="catalog-header">SA CATALOG — <span id="catalog-count">0</span> tracks</div>
    <table id="catalog-table">
      <thead>
        <tr>
          <th>TRACK ID</th>
          <th>BPM</th>
          <th>KEY</th>
          <th>DENSITY</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="catalog-body">
        <tr><td colspan="5" style="color:var(--dim);text-align:center;padding:24px">接続待ち...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- ── Log Bar ────────────────────────────────────── -->
<div id="log-bar" id="log-bar">--</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────
const state = {
  ws: null,
  scReady: false,
  tidalRunning: false,
  playingTrackId: null,
  catalog: [],
};

// ── WebSocket ─────────────────────────────────────────────────────────────
function connectWS() {
  const ws = new WebSocket('ws://localhost:8765');
  state.ws = ws;

  ws.onopen = () => {
    dot('dot-ws', 'ok');
    lbl('lbl-ws', 'WS OK');
    log_('接続しました');
  };
  ws.onclose = () => {
    dot('dot-ws', 'err');
    lbl('lbl-ws', 'WS --');
    log_('切断。3秒後に再接続します...');
    setTimeout(connectWS, 3000);
  };
  ws.onerror = () => dot('dot-ws', 'err');
  ws.onmessage = (ev) => {
    let msg;
    try { msg = JSON.parse(ev.data); } catch { return; }
    handleMsg(msg);
  };
}

function send(obj) {
  if (!state.ws || state.ws.readyState !== WebSocket.OPEN) {
    log_('WebSocket未接続');
    return;
  }
  state.ws.send(JSON.stringify(obj));
}

// ── Message Handler ───────────────────────────────────────────────────────
function handleMsg(msg) {
  switch (msg.type) {

    case 'sc_status':
      state.scReady = !!msg.ready;
      updateSCStatus();
      break;

    case 'sc_ready':
      state.scReady = true;
      updateSCStatus();
      log_('SC 起動完了');
      break;

    case 'sc_booting':
      dot('dot-sc', 'warn');
      lbl('lbl-sc', 'SC 起動中...');
      log_(msg.message || 'SC 起動中...');
      break;

    case 'tidal_started':
      state.tidalRunning = true;
      dot('dot-tidal', 'ok');
      lbl('lbl-tidal', 'Tidal OK');
      log_('Tidal 起動完了');
      break;

    case 'catalog':
      state.catalog = msg.tracks || [];
      renderCatalog(state.catalog);
      log_(`カタログ取得: ${state.catalog.length} 件`);
      break;

    case 'playing':
      state.playingTrackId = msg.track_id;
      updateNowPlaying(msg);
      highlightPlaying(msg.track_id);
      log_(`再生: ${msg.track_id}  BPM=${msg.bpm}  key=${msg.key_root} ${msg.key_mode}`);
      break;

    case 'stopped':
      state.playingTrackId = null;
      clearNowPlaying();
      highlightPlaying(null);
      log_('停止');
      break;

    case 'error':
      log_('エラー: ' + (msg.message || '?'));
      break;
  }
}

// ── SC Status ─────────────────────────────────────────────────────────────
function updateSCStatus() {
  dot('dot-sc', state.scReady ? 'ok' : 'err');
  lbl('lbl-sc', state.scReady ? 'SC OK' : 'SC --');
}

// ── Now Playing ───────────────────────────────────────────────────────────
function updateNowPlaying(msg) {
  setText('np-track', msg.track_id || '--');
  setText('np-bpm',   msg.bpm != null ? msg.bpm.toFixed(1) : '--');
  setText('np-key-val', [msg.key_root, msg.key_mode].filter(Boolean).join(' ') || '--');
  setText('np-synth', msg.synth || '--');

  const lines = (msg.all_lines || []).slice(0, 6);
  const container = document.getElementById('np-lines');
  if (container) {
    container.innerHTML = lines.map(l =>
      `<div class="tidal-line">${esc(l)}</div>`
    ).join('');
  }
}

function clearNowPlaying() {
  ['np-track','np-bpm','np-key-val','np-synth'].forEach(id => setText(id, '--'));
  const container = document.getElementById('np-lines');
  if (container) container.innerHTML = '';
}

// ── Catalog ───────────────────────────────────────────────────────────────
function renderCatalog(tracks) {
  setText('catalog-count', tracks.length.toString());
  const tbody = document.getElementById('catalog-body');
  if (!tbody) return;

  if (!tracks.length) {
    tbody.innerHTML = '<tr><td colspan="5" style="color:var(--dim);text-align:center;padding:24px">トラックなし</td></tr>';
    return;
  }

  tbody.innerHTML = tracks.map(t => {
    const bpm  = t.bpm   != null ? t.bpm.toFixed(1)   : '--';
    const key  = t.key   || '--';
    const dens = t.density != null ? t.density : 0;
    const densPct = Math.round(dens * 100);
    const trackId = esc(t.track_id || '');

    return `<tr class="track-row" data-id="${trackId}">
      <td class="col-id" title="${trackId}">${trackId}</td>
      <td class="col-bpm">${bpm}</td>
      <td class="col-key">${esc(key)}</td>
      <td class="col-dens">
        <div class="density-bar-wrap">
          <div class="density-bar-fill" style="width:${densPct}%"></div>
        </div>
        <span style="margin-left:6px;color:var(--text2)">${densPct}%</span>
      </td>
      <td class="col-play">
        <button class="play-btn" data-id="${trackId}">▶</button>
      </td>
    </tr>`;
  }).join('');

  // Row click → play
  tbody.querySelectorAll('.track-row').forEach(row => {
    row.addEventListener('click', (e) => {
      if (e.target.classList.contains('play-btn')) return; // handled separately
      playTrack(row.dataset.id);
    });
  });

  // Play button click
  tbody.querySelectorAll('.play-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      playTrack(btn.dataset.id);
    });
  });
}

function highlightPlaying(trackId) {
  document.querySelectorAll('#catalog-body .track-row').forEach(row => {
    if (trackId && row.dataset.id === trackId) {
      row.classList.add('playing');
    } else {
      row.classList.remove('playing');
    }
  });
}

function playTrack(trackId) {
  send({ type: 'play', track_id: trackId });
}

// ── Controls ──────────────────────────────────────────────────────────────
document.getElementById('btn-sc-start').addEventListener('click', () => {
  send({ type: 'sc_start' });
  log_('SC 起動リクエスト送信');
});
document.getElementById('btn-sc-stop').addEventListener('click', () => {
  send({ type: 'sc_stop' });
  log_('SC 停止リクエスト送信');
});
document.getElementById('btn-tidal-start').addEventListener('click', () => {
  send({ type: 'tidal_start' });
  log_('Tidal 起動リクエスト送信...');
});
document.getElementById('btn-stop').addEventListener('click', () => {
  send({ type: 'stop' });
});

// ── Util ──────────────────────────────────────────────────────────────────
function dot(id, cls) {
  const el = document.getElementById(id);
  if (el) el.className = 'dot ' + cls;
}
function lbl(id, text) {
  const el = document.getElementById(id);
  if (el) el.textContent = text;
}
function setText(id, text) {
  const el = document.getElementById(id);
  if (el) el.textContent = text;
}
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
function log_(msg) {
  const el = document.getElementById('log-bar');
  if (el) el.textContent = new Date().toLocaleTimeString('ja-JP') + '  ' + msg;
}

// ── Init ──────────────────────────────────────────────────────────────────
connectWS();
</script>
</body>
</html>
