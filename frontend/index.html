<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MaToMa</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --bg2: #111;
  --bg3: #1a1a1a;
  --border: #2a2a2a;
  --accent: #4ade80;
  --accent2: #22c55e;
  --dim: #555;
  --text: #ccc;
  --text2: #888;
  --danger: #f87171;
  --warn: #facc15;
  --node-w: 140px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'SF Mono', 'Fira Mono', monospace;
  font-size: 12px;
}

/* ── Header ─────────────────────────────────── */
#header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  height: 40px;
}
#header h1 {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.15em;
  color: var(--accent);
}
.status-dot {
  display: inline-block;
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--dim);
  margin-right: 5px;
  vertical-align: middle;
  transition: background 0.3s;
}
.status-dot.ok { background: var(--accent); }
.status-dot.warn { background: var(--warn); }
.status-dot.err { background: var(--danger); }

/* ── Tabs ───────────────────────────────────── */
#tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
}
.tab-btn {
  padding: 8px 20px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text2);
  cursor: pointer;
  font-family: inherit;
  font-size: 11px;
  letter-spacing: 0.1em;
  transition: color 0.2s, border-color 0.2s;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── Views ──────────────────────────────────── */
.view { display: none; }
.view.active { display: flex; flex-direction: column; height: calc(100vh - 81px); }

/* ── Signal Flow View ───────────────────────── */
#flow-nodes {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 16px 12px;
  gap: 0;
  flex-shrink: 0;
  overflow-x: auto;
}

.node-card {
  width: var(--node-w);
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px 10px;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  text-align: center;
  flex-shrink: 0;
}
.node-card:hover { border-color: var(--dim); }
.node-card.selected {
  border-color: var(--accent);
  background: #0d1f14;
}
.node-label {
  font-size: 10px;
  letter-spacing: 0.15em;
  color: var(--text2);
  margin-bottom: 6px;
}
.node-primary {
  font-size: 20px;
  font-weight: 700;
  color: var(--accent);
  line-height: 1.1;
  min-height: 24px;
}
.node-secondary {
  font-size: 10px;
  color: var(--text2);
  margin-top: 4px;
  min-height: 14px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.node-badge {
  display: inline-block;
  margin-top: 4px;
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 9px;
  background: var(--bg2);
  color: var(--dim);
}
.node-badge.running { background: #0d1f14; color: var(--accent); }

.flow-arrow {
  color: var(--dim);
  font-size: 18px;
  padding: 0 6px;
  user-select: none;
  flex-shrink: 0;
}

/* ── Detail Panel ───────────────────────────── */
#detail-panel {
  flex: 1;
  overflow-y: auto;
  border-top: 1px solid var(--border);
  padding: 20px 24px;
  background: var(--bg);
}
.detail-title {
  font-size: 11px;
  letter-spacing: 0.12em;
  color: var(--text2);
  margin-bottom: 16px;
}
.detail-section { margin-bottom: 20px; }
.detail-section-label {
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 0.1em;
  margin-bottom: 8px;
}

/* button groups */
.btn-group {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.btn {
  padding: 6px 12px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  cursor: pointer;
  font-family: inherit;
  font-size: 11px;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.btn:hover { border-color: var(--dim); }
.btn.active {
  background: var(--accent2);
  border-color: var(--accent);
  color: #000;
  font-weight: 700;
}
.btn.danger { border-color: var(--danger); color: var(--danger); }
.btn.danger:hover { background: #2a1010; }
.btn.primary { border-color: var(--accent); color: var(--accent); }
.btn.primary:hover { background: #0d1f14; }

/* sliders */
.slider-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 6px;
}
.slider-row label { min-width: 80px; color: var(--text2); font-size: 11px; }
.slider-row input[type=range] {
  flex: 1;
  accent-color: var(--accent);
}
.slider-row .val { min-width: 40px; text-align: right; color: var(--text); }

/* energy bar */
.energy-bar-wrap {
  width: 100%;
  height: 6px;
  background: var(--bg3);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 6px;
}
.energy-bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
  transition: width 0.5s;
}

/* tidal lines */
.tidal-line {
  padding: 4px 8px;
  background: var(--bg3);
  border-radius: 3px;
  font-size: 10px;
  color: var(--text2);
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── NODE TREE View ─────────────────────────── */
#view-tree {
  overflow-y: auto;
  padding: 16px 20px;
}
#tree-status {
  color: var(--text2);
  font-size: 11px;
  margin-bottom: 12px;
}
.tree-node {
  padding: 2px 0;
}
.tree-node-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 2px 4px;
  border-radius: 3px;
  cursor: default;
}
.tree-node-row:hover { background: var(--bg3); }
.tree-indent { display: inline-block; width: 16px; flex-shrink: 0; }
.tree-type-group { color: var(--warn); font-size: 10px; }
.tree-type-synth { color: var(--accent); font-size: 10px; }
.tree-id { color: var(--dim); font-size: 10px; }
.tree-def { color: var(--text2); font-size: 10px; }

/* ── Utility ────────────────────────────────── */
.row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
hr.divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
</style>
</head>
<body>

<!-- ── Header ─────────────────────────────────── -->
<div id="header">
  <div class="row">
    <span class="status-dot" id="dot-ws"></span>
    <span id="label-ws" style="color:var(--text2)">WS --</span>
    <span style="color:var(--border)">|</span>
    <span class="status-dot" id="dot-sc"></span>
    <span id="label-sc" style="color:var(--text2)">SC --</span>
  </div>
  <h1>MaToMa</h1>
  <div>
    <span id="label-energy" style="color:var(--text2);font-size:10px">E: --</span>
  </div>
</div>

<!-- ── Tabs ───────────────────────────────────── -->
<div id="tabs">
  <button class="tab-btn active" data-tab="flow">SIGNAL FLOW</button>
  <button class="tab-btn" data-tab="tree">SC NODE TREE</button>
</div>

<!-- ── Signal Flow View ───────────────────────── -->
<div id="view-flow" class="view active">
  <div id="flow-nodes">
    <div class="node-card selected" id="node-key" data-node="key">
      <div class="node-label">KEY</div>
      <div class="node-primary" id="nk-root">--</div>
      <div class="node-secondary" id="nk-mode">--</div>
    </div>
    <div class="flow-arrow">→</div>
    <div class="node-card" id="node-harmony" data-node="harmony">
      <div class="node-label">HARMONY</div>
      <div class="node-primary" id="nh-state">--</div>
      <div class="node-secondary" id="nh-remaining">--</div>
      <div class="node-badge" id="nh-badge">stopped</div>
    </div>
    <div class="flow-arrow">→</div>
    <div class="node-card" id="node-rhythm" data-node="rhythm">
      <div class="node-label">RHYTHM</div>
      <div class="node-primary" id="nr-preset" style="font-size:13px">--</div>
      <div class="node-secondary" id="nr-bpm">-- BPM</div>
      <div class="node-badge" id="nr-badge">stopped</div>
    </div>
    <div class="flow-arrow">→</div>
    <div class="node-card" id="node-synth" data-node="synth">
      <div class="node-label">SYNTH</div>
      <div class="node-primary" id="ns-energy">--</div>
      <div class="node-secondary" id="ns-nodes">-- synths</div>
    </div>
    <div class="flow-arrow">→</div>
    <div class="node-card" id="node-out" data-node="out">
      <div class="node-label">OUT</div>
      <div class="node-primary" id="no-status" style="font-size:13px">--</div>
      <div class="node-secondary" id="no-sub">waiting...</div>
    </div>
  </div>

  <div id="detail-panel"><!-- filled by JS --></div>
</div>

<!-- ── SC Node Tree View ─────────────────────── -->
<div id="view-tree" class="view">
  <div id="tree-status">SC 起動後に自動取得されます（6秒ごとに更新）</div>
  <div id="tree-container"></div>
</div>

<script>
// ── State ────────────────────────────────────────────────────────────────
const state = {
  ws: null,
  selectedNode: 'key',
  flow: { key: null, harmony: null, rhythm: null },
  energy: null,
  scReady: false,
  nodeTree: null,
  activePreset: null,
  synthNodeData: {},
};

const ROOTS = ['C','Db','D','Eb','E','F','Fs','G','Ab','A','Bb','B'];
const SCALES = ['major','minor','dorian','phrygian'];
const MARKOV_STATES = ['void','sparse','medium','dense','intense'];
const PRESETS = [
  'alva_euclidean','alva_phase','opn_sparse','minimal_klank','chaos_collapse'
];
const PRESET_LABELS = {
  'alva_euclidean': 'Alva Eucl',
  'alva_phase':     'Alva Phase',
  'opn_sparse':     'OPN Sparse',
  'minimal_klank':  'Minimal',
  'chaos_collapse': 'Chaos',
};

// ── WebSocket ────────────────────────────────────────────────────────────
function connectWS() {
  const ws = new WebSocket('ws://localhost:8765');
  state.ws = ws;

  ws.onopen = () => {
    setDot('dot-ws', 'ok');
    setEl('label-ws', 'WS OK');
  };
  ws.onclose = () => {
    setDot('dot-ws', 'err');
    setEl('label-ws', 'WS --');
    setTimeout(connectWS, 3000);
  };
  ws.onerror = () => setDot('dot-ws', 'err');
  ws.onmessage = (ev) => {
    let msg;
    try { msg = JSON.parse(ev.data); } catch { return; }
    handleMsg(msg);
  };
}

function send(address, args = []) {
  if (!state.ws || state.ws.readyState !== WebSocket.OPEN) return;
  state.ws.send(JSON.stringify({ address, args }));
}

// ── Message handler ──────────────────────────────────────────────────────
function handleMsg(msg) {
  switch (msg.type) {
    case 'sc_status':
      state.scReady = !!msg.ready;
      updateSCStatus();
      break;
    case 'sc_ready':
      state.scReady = true;
      updateSCStatus();
      break;
    case 'sc_heartbeat':
      setDot('dot-sc', 'ok');
      break;
    case 'flow_state':
      mergeFlow(msg.flow);
      updateFlowNodes();
      if (state.selectedNode) rerenderIfActive(state.selectedNode, ['key','harmony','rhythm']);
      break;
    case 'chaos_state':
      state.energy = msg.energy;
      setEl('label-energy', 'E: ' + (msg.energy != null ? (msg.energy*100).toFixed(0)+'%' : '--'));
      state.synthNodeData = msg;
      setEl('ns-energy', msg.energy != null ? (msg.energy*100).toFixed(0)+'%' : '--');
      rerenderIfActive('synth', ['synth']);
      break;
    case 'sc_node_tree':
      state.nodeTree = msg.tree;
      updateNodeTreeView();
      setEl('ns-nodes', countSynths(msg.tree) + ' synths');
      rerenderIfActive('synth', ['synth']);
      break;
    case 'tidal_applied':
      state.activePreset = msg.preset;
      if (state.flow.rhythm) state.flow.rhythm.preset = msg.preset;
      updateFlowNodes();
      rerenderIfActive('rhythm', ['rhythm']);
      break;
    case 'markov_state':
      if (!state.flow.harmony) state.flow.harmony = {};
      state.flow.harmony.markov_state = msg.state;
      state.flow.harmony.running = msg.state && msg.state.running;
      updateFlowNodes();
      rerenderIfActive('harmony', ['harmony']);
      break;
    case 'score_state':
      // music_gen からのポーリング応答（flow_state にも含まれるが念のため）
      if (!state.flow.key) state.flow.key = {};
      Object.assign(state.flow.key, msg);
      updateFlowNodes();
      rerenderIfActive('key', ['key']);
      break;
  }
}

function rerenderIfActive(node, watchedNodes) {
  if (watchedNodes.includes(state.selectedNode)) {
    renderDetail(state.selectedNode);
  }
}

function mergeFlow(flow) {
  if (!flow) return;
  if (flow.key) {
    if (!state.flow.key) state.flow.key = {};
    Object.assign(state.flow.key, flow.key);
  }
  if (flow.harmony) {
    if (!state.flow.harmony) state.flow.harmony = {};
    Object.assign(state.flow.harmony, flow.harmony);
  }
  if (flow.rhythm) {
    if (!state.flow.rhythm) state.flow.rhythm = {};
    Object.assign(state.flow.rhythm, flow.rhythm);
  }
}

// ── Node card updates ─────────────────────────────────────────────────────
function updateFlowNodes() {
  const { key, harmony, rhythm } = state.flow;

  if (key) {
    setEl('nk-root', key.root || '--');
    setEl('nk-mode', key.mode || '--');
  }
  if (harmony) {
    const ms = harmony.markov_state || {};
    setEl('nh-state', ms.state || '--');
    setEl('nh-remaining', ms.remaining != null ? ms.remaining.toFixed(0) + 's' : '--');
    const badge = document.getElementById('nh-badge');
    if (badge) {
      badge.textContent = ms.running ? 'running' : 'stopped';
      badge.className = 'node-badge' + (ms.running ? ' running' : '');
    }
  }
  if (rhythm) {
    const pl = PRESET_LABELS[rhythm.preset] || rhythm.preset || '--';
    setEl('nr-preset', pl);
    setEl('nr-bpm', rhythm.tempo_bpm != null ? rhythm.tempo_bpm.toFixed(0) + ' BPM' : '-- BPM');
    const badge = document.getElementById('nr-badge');
    if (badge) {
      badge.textContent = rhythm.running ? 'running' : 'stopped';
      badge.className = 'node-badge' + (rhythm.running ? ' running' : '');
    }
  }
}

function updateSCStatus() {
  setDot('dot-sc', state.scReady ? 'ok' : 'warn');
  setEl('label-sc', state.scReady ? 'SC OK' : 'SC --');
  setEl('no-status', state.scReady ? 'READY' : 'OFFLINE');
  const el = document.getElementById('no-status');
  if (el) el.style.color = state.scReady ? 'var(--accent)' : 'var(--danger)';
  setEl('no-sub', state.scReady ? 'SC server' : 'waiting...');
}

function countSynths(node) {
  if (!node) return 0;
  if (node.type === 'synth') return 1;
  return (node.children || []).reduce((s, c) => s + countSynths(c), 0);
}
function collectSynths(node) {
  if (!node) return [];
  if (node.type === 'synth') return [node];
  return (node.children || []).flatMap(collectSynths);
}

// ── Node selection ────────────────────────────────────────────────────────
document.querySelectorAll('.node-card').forEach(card => {
  card.addEventListener('click', () => {
    document.querySelectorAll('.node-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    state.selectedNode = card.dataset.node;
    renderDetail(state.selectedNode);
  });
});

function renderDetail(node) {
  const panel = document.getElementById('detail-panel');
  switch (node) {
    case 'key':     panel.innerHTML = detailKey();     bindKey();     break;
    case 'harmony': panel.innerHTML = detailHarmony(); bindHarmony(); break;
    case 'rhythm':  panel.innerHTML = detailRhythm();  bindRhythm();  break;
    case 'synth':   panel.innerHTML = detailSynth();   bindSynth();   break;
    case 'out':     panel.innerHTML = detailOut();     bindOut();     break;
  }
}

// ── KEY detail ────────────────────────────────────────────────────────────
function detailKey() {
  const key = state.flow.key || {};
  const root = key.root || 'C';
  const mode = key.mode || 'major';
  const density = key.density_override;
  const densityVal = density != null ? density.toFixed(2) : '0.50';
  const running = key.running;

  const rootBtns = ROOTS.map(r =>
    `<button class="btn${r===root?' active':''}" data-root="${r}">${r}</button>`
  ).join('');
  const scaleBtns = SCALES.map(s =>
    `<button class="btn${s===mode?' active':''}" data-scale="${s}">${s}</button>`
  ).join('');

  return `<div class="detail-title">KEY — キーとスケール</div>
    <div class="detail-section">
      <div class="detail-section-label">ROOT</div>
      <div class="btn-group" id="root-btns">${rootBtns}</div>
    </div>
    <div class="detail-section">
      <div class="detail-section-label">SCALE</div>
      <div class="btn-group" id="scale-btns">${scaleBtns}</div>
    </div>
    <div class="detail-section">
      <div class="detail-section-label">DENSITY</div>
      <div class="slider-row">
        <label>onset</label>
        <input type="range" id="density-sl" min="0" max="1" step="0.01" value="${densityVal}">
        <span class="val" id="density-val">${densityVal}</span>
      </div>
    </div>
    <hr class="divider">
    <div class="detail-section">
      <div class="detail-section-label">MUSIC GENERATOR</div>
      <div class="btn-group">
        <button class="btn primary" id="btn-mg-start">START</button>
        <button class="btn danger" id="btn-mg-stop">STOP</button>
      </div>
      <div style="margin-top:6px;color:var(--text2);font-size:10px">
        ${running != null ? (running ? '● 動作中' : '■ 停止中') : ''}
      </div>
    </div>
    ${key.tidal_lines && key.tidal_lines.length ? `<div class="detail-section">
      <div class="detail-section-label">LAST TIDAL LINES</div>
      ${key.tidal_lines.map(l=>`<div class="tidal-line">${esc(l)}</div>`).join('')}
    </div>` : ''}`;
}

function bindKey() {
  document.querySelectorAll('#root-btns .btn').forEach(b =>
    b.addEventListener('click', () => send('/matoma/music_gen/set_root', [b.dataset.root])));
  document.querySelectorAll('#scale-btns .btn').forEach(b =>
    b.addEventListener('click', () => send('/matoma/music_gen/set_scale', [b.dataset.scale])));
  const sl = q('density-sl'), vl = q('density-val');
  if (sl) {
    sl.addEventListener('input', () => { if(vl) vl.textContent = (+sl.value).toFixed(2); });
    sl.addEventListener('change', () => send('/matoma/music_gen/set_density', [+sl.value]));
  }
  q('btn-mg-start')?.addEventListener('click', () => send('/matoma/music_gen/start'));
  q('btn-mg-stop')?.addEventListener('click',  () => send('/matoma/music_gen/stop'));
}

// ── HARMONY detail ────────────────────────────────────────────────────────
function detailHarmony() {
  const h = state.flow.harmony || {};
  const ms = h.markov_state || {};
  const curState = ms.state || 'medium';
  const running = !!ms.running;
  const interval = ms.interval || 60;
  const elapsed = ms.elapsed || 0;
  const remaining = ms.remaining || 0;
  const pct = interval > 0 ? (elapsed / interval * 100).toFixed(1) : 0;

  const stateBtns = MARKOV_STATES.map(s =>
    `<button class="btn${s===curState?' active':''}" data-mstate="${s}">${s}</button>`
  ).join('');

  return `<div class="detail-title">HARMONY — Markov タイムスケール</div>
    <div class="detail-section">
      <div class="detail-section-label">STATE</div>
      <div class="btn-group" id="markov-state-btns">${stateBtns}</div>
    </div>
    <div class="detail-section">
      <div class="detail-section-label">INTERVAL</div>
      <div class="slider-row">
        <label>seconds</label>
        <input type="range" id="interval-sl" min="10" max="300" step="10" value="${interval}">
        <span class="val" id="interval-val">${interval}s</span>
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-section-label">PROGRESS</div>
      <div style="color:var(--text2);font-size:10px;margin-bottom:4px">
        elapsed ${elapsed.toFixed(0)}s / remaining ${remaining.toFixed(0)}s
      </div>
      <div class="energy-bar-wrap">
        <div class="energy-bar-fill" style="width:${pct}%"></div>
      </div>
    </div>
    <hr class="divider">
    <div class="detail-section">
      <div class="btn-group">
        <button class="btn primary" id="btn-mk-start">START</button>
        <button class="btn danger" id="btn-mk-stop">STOP</button>
      </div>
      <div style="margin-top:6px;color:var(--text2);font-size:10px">
        ${running ? '● Markov 動作中' : '■ Markov 停止中'}
      </div>
    </div>`;
}

function bindHarmony() {
  document.querySelectorAll('#markov-state-btns .btn').forEach(b =>
    b.addEventListener('click', () => send('/matoma/markov/set_state', [b.dataset.mstate])));
  const sl = q('interval-sl'), vl = q('interval-val');
  if (sl) {
    sl.addEventListener('input', () => { if(vl) vl.textContent = sl.value + 's'; });
    sl.addEventListener('change', () => send('/matoma/markov/interval', [+sl.value]));
  }
  q('btn-mk-start')?.addEventListener('click', () => send('/matoma/markov/start'));
  q('btn-mk-stop')?.addEventListener('click',  () => send('/matoma/markov/stop'));
}

// ── RHYTHM detail ─────────────────────────────────────────────────────────
function detailRhythm() {
  const r = state.flow.rhythm || {};
  const preset = r.preset || state.activePreset || '';
  const bpm = r.tempo_bpm || 120;
  const running = !!r.running;

  const presetBtns = PRESETS.map(p =>
    `<button class="btn${p===preset?' active':''}" data-preset="${p}">${PRESET_LABELS[p]||p}</button>`
  ).join('');

  return `<div class="detail-title">RHYTHM — Tidal Cycles</div>
    <div class="detail-section">
      <div class="detail-section-label">PRESET</div>
      <div class="btn-group" id="preset-btns">${presetBtns}</div>
    </div>
    <div class="detail-section">
      <div class="detail-section-label">TEMPO</div>
      <div class="slider-row">
        <label>BPM</label>
        <input type="range" id="bpm-sl" min="40" max="200" step="1" value="${bpm.toFixed(0)}">
        <span class="val" id="bpm-val">${bpm.toFixed(0)}</span>
      </div>
    </div>
    <hr class="divider">
    <div class="detail-section">
      <div class="btn-group">
        <button class="btn primary" id="btn-tidal-start">START</button>
        <button class="btn" id="btn-tidal-hush">HUSH</button>
        <button class="btn danger" id="btn-tidal-stop">STOP</button>
      </div>
      <div style="margin-top:6px;color:var(--text2);font-size:10px">
        ${running ? '● Tidal 動作中' : '■ Tidal 停止中'}
      </div>
    </div>`;
}

function bindRhythm() {
  document.querySelectorAll('#preset-btns .btn').forEach(b =>
    b.addEventListener('click', () => send('/matoma/tidal/preset', [b.dataset.preset])));
  const sl = q('bpm-sl'), vl = q('bpm-val');
  if (sl) {
    sl.addEventListener('input', () => { if(vl) vl.textContent = sl.value; });
    sl.addEventListener('change', () => send('/matoma/tidal/tempo', [+sl.value]));
  }
  q('btn-tidal-start')?.addEventListener('click', () => send('/matoma/tidal/start'));
  q('btn-tidal-hush')?.addEventListener('click',  () => send('/matoma/tidal/hush'));
  q('btn-tidal-stop')?.addEventListener('click',  () => send('/matoma/tidal/stop'));
}

// ── SYNTH detail ──────────────────────────────────────────────────────────
function detailSynth() {
  const e = state.energy;
  const pct = e != null ? (e * 100).toFixed(1) : '0';
  const synths = collectSynths(state.nodeTree);
  const synthList = synths.length
    ? synths.map(s => `<div class="tidal-line">[${s.id}] ${esc(s.def)}</div>`).join('')
    : `<div style="color:var(--dim);font-size:10px">${state.nodeTree ? 'アクティブなSynthなし' : 'ノードツリー未取得'}</div>`;

  return `<div class="detail-title">SYNTH — SC エンジン</div>
    <div class="detail-section">
      <div class="detail-section-label">ENERGY</div>
      <div class="energy-bar-wrap">
        <div class="energy-bar-fill" style="width:${pct}%"></div>
      </div>
      <div style="margin-top:4px;color:var(--text2);font-size:10px">${pct}%</div>
    </div>
    <div class="detail-section">
      <div class="detail-section-label">ACTIVE SYNTHS</div>
      ${synthList}
    </div>
    <hr class="divider">
    <div class="detail-section">
      <div class="btn-group">
        <button class="btn danger" id="btn-free-all">FREE ALL</button>
        <button class="btn" id="btn-refresh-tree">ツリー更新</button>
      </div>
    </div>`;
}

function bindSynth() {
  q('btn-free-all')?.addEventListener('click', () => send('/matoma/sc/free_all', []));
  q('btn-refresh-tree')?.addEventListener('click', () => send('/matoma/sc/query_tree', []));
}

// ── OUT detail ────────────────────────────────────────────────────────────
function detailOut() {
  const ready = state.scReady;
  return `<div class="detail-title">OUT — SuperCollider サーバー</div>
    <div class="detail-section">
      <div style="font-size:16px;color:${ready?'var(--accent)':'var(--danger)'};margin-bottom:12px">
        ${ready ? '● SC READY' : '○ SC OFFLINE'}
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-section-label">SERVER</div>
      <div class="btn-group">
        <button class="btn primary" id="btn-sc-start">起動</button>
        <button class="btn danger" id="btn-sc-stop">停止</button>
        <button class="btn" id="btn-sc-reboot">リブート</button>
      </div>
    </div>
    <hr class="divider">
    <div class="detail-section">
      <div class="detail-section-label">THREE LAYER CONTROLLER</div>
      <div class="btn-group">
        <button class="btn primary" id="btn-ctrl-start">START</button>
        <button class="btn danger" id="btn-ctrl-stop">STOP</button>
      </div>
    </div>`;
}

function bindOut() {
  q('btn-sc-start')?.addEventListener('click',  () => send('/matoma/sc/start',  []));
  q('btn-sc-stop')?.addEventListener('click',   () => send('/matoma/sc/stop',   []));
  q('btn-sc-reboot')?.addEventListener('click', () => send('/matoma/sc/reboot', []));
  q('btn-ctrl-start')?.addEventListener('click',() => send('/matoma/controller/start',[]));
  q('btn-ctrl-stop')?.addEventListener('click', () => send('/matoma/controller/stop', []));
}

// ── NODE TREE view ────────────────────────────────────────────────────────
function updateNodeTreeView() {
  const container = document.getElementById('tree-container');
  const status = document.getElementById('tree-status');
  if (!state.nodeTree) {
    if (status) status.textContent = 'ノードツリー未取得';
    if (container) container.innerHTML = '';
    return;
  }
  if (status) status.textContent = '最終更新: ' + new Date().toLocaleTimeString('ja-JP');
  if (container) container.innerHTML = renderTreeNode(state.nodeTree, 0);
}

function renderTreeNode(node, depth) {
  if (!node) return '';
  const indent = '&nbsp;'.repeat(depth * 4);
  if (node.type === 'synth') {
    return `<div class="tree-node">
      <div class="tree-node-row">
        ${indent}
        <span class="tree-type-synth">SYN</span>
        <span class="tree-id">#${node.id}</span>
        <span class="tree-def">${esc(node.def)}</span>
      </div>
    </div>`;
  }
  const kids = (node.children || []).map(c => renderTreeNode(c, depth + 1)).join('');
  return `<div class="tree-node">
    <div class="tree-node-row">
      ${indent}
      <span class="tree-type-group">GRP</span>
      <span class="tree-id">#${node.id}</span>
      <span style="color:var(--dim);font-size:10px">[${(node.children||[]).length}]</span>
    </div>
    ${kids}
  </div>`;
}

// ── Tabs ──────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('view-' + btn.dataset.tab).classList.add('active');
  });
});

// ── Util ──────────────────────────────────────────────────────────────────
function setDot(id, cls) {
  const el = document.getElementById(id);
  if (el) el.className = 'status-dot ' + cls;
}
function setEl(id, text) {
  const el = document.getElementById(id);
  if (el) el.textContent = text;
}
function q(id) { return document.getElementById(id); }
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Init ──────────────────────────────────────────────────────────────────
renderDetail('key');
connectWS();
</script>
</body>
</html>
